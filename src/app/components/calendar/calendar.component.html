<div class="calendar-page">
    <header class="calendar-header">
        <div class="title-group">
            <h1>Agenda</h1>
            <p>{{ currentDate | date:'MMMM yyyy':'':'pt-BR' }}</p>
        </div>
        <div class="ctrls">
            <button class="btn btn-outline" (click)="onPrevMonth()">← Anterior</button>
            <button class="btn btn-outline" (click)="onNextMonth()">Próximo →</button>
        </div>
    </header>

    <div class="calendar-grid card">
        <div class="weekday" *ngFor="let day of weekDays">{{ day }}</div>

        <div class="day-cell" *ngFor="let d of daysInMonth" [class.empty]="d.day === 0"
            (click)="d.day !== 0 && openNewAppointment(d.day)">
            <span class="day-num" *ngIf="d.day !== 0">{{ d.day }}</span>
            <div class="apps-container" *ngIf="d.day !== 0">
                <div *ngFor="let app of d.appointments" class="app-tag" [ngClass]="app.status">
                    {{ app.clientFirstName }}
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Agendamento -->
    <div class="modal-overlay" *ngIf="showModal">
        <div class="modal card">
            <div class="modal-header">
                <h2>Novo Agendamento</h2>
                <button (click)="showModal = false" class="close-btn">&times;</button>
            </div>

            <div class="modal-body">
                <div class="form-group">
                    <label>Cliente *</label>
                    <select [(ngModel)]="editingAppointment.clientId" class="form-control">
                        <option [ngValue]="0" disabled>Selecione um cliente...</option>
                        <option *ngFor="let c of clients" [ngValue]="c.id">{{ c.name }}</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Data e Hora *</label>
                        <input type="datetime-local" [(ngModel)]="editingAppointment.dateTime">
                    </div>
                    <div class="form-group">
                        <label>Duração (min)</label>
                        <input type="number" [(ngModel)]="editingAppointment.durationMinutes">
                    </div>
                </div>

                <div class="form-group">
                    <label>Assunto / Serviço</label>
                    <input type="text" [(ngModel)]="editingAppointment.subject" placeholder="Ex: Corte Degrade">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" (click)="showModal = false"
                        [disabled]="isSaving">Cancelar</button>
                    <button type="button" class="btn btn-primary" (click)="saveAppointment()" [disabled]="isSaving">
                        {{ isSaving ? 'Salvando...' : 'Agendar' }}
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
