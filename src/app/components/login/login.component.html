<div class="login-container">
  <div class="login-card card">
    <div class="login-header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-scissors"><circle cx="6" cy="6" r="3"/><path d="M8.12 8.12 12 12"/><path d="M20 4 8.12 15.88"/><circle cx="6" cy="18" r="3"/><path d="M14.8 14.8 20 20"/></svg>
      </div>
      <h1>BarberShop Pro</h1>
      <p>Gestão Inteligente para sua Barbearia</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" [(ngModel)]="email" required placeholder="seu@email.com">
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" [(ngModel)]="password" required placeholder="••••••••">
      </div>

      <div *ngIf="error" class="error-msg">
        {{ error }}
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="!loginForm.form.valid || loading">
        <span *ngIf="!loading">Entrar no Sistema</span>
        <span *ngIf="loading">Carregando...</span>
      </button>
    </form>
    
    <div class="login-footer">
      <p>Esqueceu sua senha? <a href="#">Recuperar</a></p>
    </div>
  </div>
</div>
